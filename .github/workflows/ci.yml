name: CI

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    name: non-mpi / ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        python-version: [ "3.9", "3.10", "3.11", "3.12", "3.13" ]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install uv

      - name: Sync environment
        run: uv sync

      - name: Tests
        run: uv run pytest -m "not mpi"

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy

  test-mpi-linux:
    name: mpi / ubuntu-latest / py3.12 / 4 ranks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup MPI
        uses: mpi4py/setup-mpi@v1
        with:
          mpi: 'openmpi'

      - name: Install uv
        run: python -m pip install uv

      - name: Sync environment with MPI extra
        run: uv sync --extra mpi

      - name: MPI tests (4 ranks)
        run: mpirun -n 4 uv run pytest -m mpi -o addopts="-q -m mpi"
